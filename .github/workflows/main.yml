name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Java (IMPORTANT)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Init project
      - run: npm init -y

      # Install everything
      - run: npm install @capacitor/core @capacitor/cli @capacitor/android

      # Create web files
      - run: mkdir www
      - run: cp index.html www/index.html

      # Init capacitor
      - run: npx cap init "Oni Short" oni.short.app --web-dir=www

      # Add android
      - run: npx cap add android || echo "already added"

      # Sync
      - run: npx cap sync

      # 🔥 CLEAN GRADLE CACHE (IMPORTANT FIX)
      - run: rm -rf ~/.gradle

      # Build APK
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx512m"

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
