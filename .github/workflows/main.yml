name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ ANDROID SDK FIX
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Project init
      - run: npm init -y
      - run: npm install @capacitor/core @capacitor/cli

      # Web files
      - run: mkdir www
      - run: cp index.html www/index.html

      # Capacitor
      - run: npx cap init "Oni Short" oni.short.app --web-dir=www

      # Android build
      - run: npx cap add android
      - run: npx cap sync

      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
