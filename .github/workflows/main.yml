name: Build Simple APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Android Project
        run: |
          mkdir app
          cd app

          echo "apply plugin: 'com.android.application'" > build.gradle

          mkdir -p src/main/java/com/example/app
          mkdir -p src/main/res/layout

          echo '<manifest package="com.example.app"></manifest>' > src/main/AndroidManifest.xml

      - name: Build APK (dummy)
        run: echo "APK ban gaya (basic)"
