name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm init -y
      - run: npm install @capacitor/core @capacitor/cli

      # ✅ FIRST create www folder
      - run: mkdir www
      - run: cp index.html www/index.html

      # ✅ THEN init capacitor
      - run: npx cap init "Oni Short" oni.short.app --web-dir=www

      # ✅ Android setup
      - run: npx cap add android
      - run: npx cap sync

      # ✅ Build APK
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      # ✅ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
