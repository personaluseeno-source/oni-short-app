name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Init project
      - run: npm init -y

      # Install capacitor core + cli + android (IMPORTANT)
      - run: npm install @capacitor/core @capacitor/cli @capacitor/android

      # Create web folder & copy your site
      - run: mkdir www
      - run: cp index.html www/index.html

      # Init capacitor
      - run: npx cap init "Oni Short" oni.short.app --web-dir=www

      # Add Android platform
      - run: npx cap add android

      # Sync files
      - run: npx cap sync

      # Build APK
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      # Upload APK (FIXED VERSION v4)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
